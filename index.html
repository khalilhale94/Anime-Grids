<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeGrids | team7pirates</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* THE "ARCANE" AESTHETIC */
        :root {
            --bg: #0a0a0a;
            --card: #151515;
            --accent: #ff4500; /* team7pirates Orange */
            --rarity-unicorn: #f0f;
            --text: #eee;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 { font-style: italic; color: var(--accent); text-transform: uppercase; letter-spacing: 4px; }

        /* THE GRID */
        .grid {
            display: grid;
            grid-template-columns: 80px repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
        }

        .cell {
            aspect-ratio: 1/1;
            background: var(--card);
            border: 2px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-align: center;
            position: relative;
            overflow: hidden;
            font-size: 0.75rem;
            transition: 0.3s;
        }

        .cell:hover:not(.label) { border-color: var(--accent); transform: scale(1.02); }

        .label { cursor: default; background: none; border: none; font-weight: bold; color: #666; font-size: 0.8rem; }

        /* MODAL POPUP */
        #searchModal {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: #111;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            border: 2px solid var(--accent);
            border-radius: 8px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #333;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .results { margin-top: 15px; max-height: 200px; overflow-y: auto; }
        .res-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; }
        .res-item:hover { background: var(--accent); color: white; }

        /* SUCCESS STATES */
        .correct { border-color: var(--accent); background: #000; font-weight: bold; }
        .rarity-tag {
            position: absolute;
            bottom: 5px;
            font-size: 0.6rem;
            background: rgba(0,0,0,0.8);
            padding: 2px 5px;
            border-radius: 4px;
        }
        
        /* UNICORN GLITCH ANIMATION */
        .unicorn { border-color: var(--rarity-unicorn); color: var(--rarity-unicorn); animation: glitch 0.3s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); text-shadow: 2px 0 red; }
            20% { transform: translate(-2px, 2px); text-shadow: -2px 0 blue; }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <h1>AnimeGrids</h1>
    <div style="color: #555; font-size: 0.8rem; margin-bottom: 20px;">Powered by team7pirates</div>

    <div class="grid" id="mainGrid">
        <div class="cell label"></div>
        <div class="cell label">Captain</div>
        <div class="cell label">Top Tier Title</div>
        <div class="cell label">Died</div>

        <div class="cell label">One Piece</div>
        <div class="cell" id="c0-0" onclick="openSearch(0,0)">?</div>
        <div class="cell" id="c0-1" onclick="openSearch(0,1)">?</div>
        <div class="cell" id="c0-2" onclick="openSearch(0,2)">?</div>

        <div class="cell label">Naruto</div>
        <div class="cell" id="c1-0" onclick="openSearch(1,0)">?</div>
        <div class="cell" id="c1-1" onclick="openSearch(1,1)">?</div>
        <div class="cell" id="c1-2" onclick="openSearch(1,2)">?</div>

        <div class="cell label">JJK</div>
        <div class="cell" id="c2-0" onclick="openSearch(2,0)">?</div>
        <div class="cell" id="c2-1" onclick="openSearch(2,1)">?</div>
        <div class="cell" id="c2-2" onclick="openSearch(2,2)">?</div>
    </div>

    <div id="searchModal">
        <div class="modal-box">
            <h3 id="modalTitle" style="margin-top:0; color:var(--accent)">Search</h3>
            <input type="text" id="searchInput" placeholder="Type character name..." autocomplete="off">
            <div class="results" id="results"></div>
            <p onclick="closeSearch()" style="color:#444; cursor:pointer; font-size:0.8rem; margin-top:15px; text-align:center;">Cancel</p>
        </div>
    </div>

    <script>
        // --- 1. CONFIG ---
        const SB_URL = 'https://ghqjuivxuaavcpwoohpg.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdocWp1aXZ4dWFhdmNwd29vaHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTQ1MjcsImV4cCI6MjA4ODczMDUyN30.URpK-EcM2EXdSdD9qepqSuyhz1z2QdPCMZsB0Hh_S8w';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        const rows = ["One Piece", "Naruto", "JJK"];
        const cols = ["Captain", "Top Tier Title", "Died"];
        let characters = [];
        let curR = 0, curC = 0;

        // --- 2. LOAD DATA ---
        async function init() {
            const { data } = await supabase.from('characters').select('*');
            characters = data || [];
        }
        init();

        // --- 3. UI LOGIC ---
        function openSearch(r, c) {
            curR = r; curC = c;
            document.getElementById('modalTitle').innerText = `${rows[r]} x ${cols[c]}`;
            document.getElementById('searchModal').style.display = 'flex';
            document.getElementById('searchInput').focus();
        }

        function closeSearch() {
            document.getElementById('searchModal').style.display = 'none';
            document.getElementById('searchInput').value = '';
            document.getElementById('results').innerHTML = '';
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const list = document.getElementById('results');
            list.innerHTML = '';
            if (val.length < 1) return;

            characters.filter(char => char.name.toLowerCase().includes(val)).forEach(char => {
                const div = document.createElement('div');
                div.className = 'res-item';
                div.innerText = char.name;
                div.onclick = () => handleGuess(char);
                list.appendChild(div);
            });
        });

        // --- 4. THE ENGINE (Guesses & Rarity) ---
        async function handleGuess(char) {
            const targetRow = rows[curR];
            const targetCol = cols[curC];
            const squareId = `r${curR}c${curC}`;

            // Check correctness
            const matchesSeries = (char.series === targetRow);
            const matchesTrait = (char.traits && char.traits.includes(targetCol)) || 
                                 (char.milestones && char.milestones.includes(targetCol));

            if (matchesSeries && matchesTrait) {
                const cell = document.getElementById(`c${curR}-${curC}`);
                cell.innerHTML = `<span style="z-index:2">${char.name}</span>`;
                cell.classList.add('correct');
                
                // Track guess in Supabase
                await supabase.rpc('increment_guess', { s_id: squareId, c_name: char.name });
                
                // Calculate Rarity (Demo math)
                const rarity = await getRarity(squareId, char.name);
                const rTag = document.createElement('div');
                rTag.className = 'rarity-tag';
                rTag.innerText = rarity + '%';
                cell.appendChild(rTag);
                if (parseFloat(rarity) <= 0.05) cell.classList.add('unicorn');

                closeSearch();
            } else {
                document.getElementById('searchInput').value = '';
                document.getElementById('searchInput').placeholder = "Try again...";
            }
        }

        async function getRarity(s_id, c_name) {
            const { data } = await supabase.from('global_stats').select('guess_count').eq('square_id', s_id);
            const total = data.reduce((acc, curr) => acc + curr.guess_count, 0);
            const charData = data.find(d => d.char_name === c_name);
            const charCount = charData ? charData.guess_count : 1;
            return ((charCount / total) * 100).toFixed(2);
        }
    </script>
</body>
</html>
